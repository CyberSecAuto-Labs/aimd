version: 2

project_name: aimd

before:
  hooks:
    - go mod tidy
    # Shell completions are generated from cobra's built-in `completion` command
    # and bundled into archives and Linux packages.
    - mkdir -p completions
    - sh -c "go run . completion bash > completions/aimd.bash"
    - sh -c "go run . completion zsh  > completions/aimd.zsh"
    - sh -c "go run . completion fish > completions/aimd.fish"

builds:
  - main: .
    binary: aimd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "aimd_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: checksums.txt

# Per-target SBOMs (CycloneDX JSON) generated by syft and attached as release
# assets. syft is installed in the release workflow before GoReleaser runs.
sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.cdx.json"
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"

homebrew_casks:
  - repository:
      owner: CyberSecAuto-Labs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/CyberSecAuto-Labs/aimd"
    description: "Private AI context overlays for Git repositories"
    completions:
      bash: "completions/aimd.bash"
      zsh: "completions/aimd.zsh"
      fish: "completions/aimd.fish"
    # The binary is not yet signed/notarized with an Apple Developer ID, so macOS
    # Gatekeeper quarantines cask installs. Strip the quarantine attribute on
    # install so `aimd` runs without the "Apple could not verify" prompt.
    # Remove this once Developer ID signing + notarization lands (see roadmap).
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/aimd"]
          end
    # `brew uninstall` removes only the binary. `~/.aimd` holds the user's store —
    # their actual tracked files — so it is intentionally left alone on a plain
    # uninstall (and on the uninstall half of `brew upgrade`). The store is cleaned
    # up only via the opt-in `zap` stanza below: `brew uninstall --zap aimd`. We
    # use `trash:` (recoverable) over `delete:` because it is user data.
    zap:
      trash:
        - "~/.aimd"
    caveats: |
      `brew uninstall --zap aimd` moves the store (~/.aimd) to the Trash. Any project
      still tracking files will be left with broken symlinks and stale
      .git/info/exclude entries — Homebrew cannot reach into project directories to
      clean those up. Before uninstalling, restore the real files: run
      `aimd status --all` to list tracked projects, then in each one run
      `aimd untrack <file>` (restoring is the default) for the files it tracks.

nfpms:
  - vendor: CyberSecAuto-Labs
    homepage: "https://github.com/CyberSecAuto-Labs/aimd"
    description: "Private AI context overlays for Git repositories"
    license: "Apache-2.0"
    maintainer: "CyberSecAuto-Labs"
    formats:
      - deb
      - rpm
    contents:
      - src: completions/aimd.bash
        dst: /etc/bash_completion.d/aimd
      - src: completions/aimd.zsh
        dst: /usr/share/zsh/site-functions/_aimd
      - src: completions/aimd.fish
        dst: /usr/share/fish/vendor_completions.d/aimd.fish

release:
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
