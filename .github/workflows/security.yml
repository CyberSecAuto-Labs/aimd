name: security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: stable
          go-package: ./...

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true
      - name: Verify module
        run: go mod verify

  # osv-scanner-action v2 is published as a reusable workflow, not a step action
  # (its root action.yml has no `runs:` section). SARIF is uploaded to the
  # Security tab only on push to main; on PRs we just run the gate.
  osv-scanner:
    name: osv-scanner
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./
      upload-sarif: ${{ github.event_name == 'push' }}
